<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>申込フォーム</title>

<style>
body { font-family:sans-serif; background:#f5f5f5; padding:20px;}
.container { max-width:500px; margin:auto;}
.item { background:#fff; padding:12px; margin-bottom:10px; border-radius:10px;}
input, select, textarea { width:100%; padding:8px; margin-top:5px;}
button { width:100%; padding:12px; margin-top:10px; border:none; border-radius:10px; background:#4CAF50; color:white;}
#result { white-space: pre-wrap; background:#fff; padding:10px; margin-top:10px; border-radius:10px;}
.hidden { display:none; }
</style>
</head>

<body>
<div class="container">

<h2>申込フォーム</h2>

<div class="item">お名前<input id="name"></div>
<div class="item">電話番号<input id="phone"></div>
<div class="item">メールアドレス<input id="mail"></div>

<div class="item">申込内容
<select id="plan">
<option>ネットのみ</option>
<option>ネット・新番</option>
<option>ネット・ポーター</option>
</select>
</div>

<div class="item">現状回線
<select id="line">
<option>ドコモ光</option>
<option>ソフトバンク光</option>
<option>AU光</option>
<option>エアー</option>
<option>5G</option>
<option>フレッツ</option>
<option>OCN光</option>
<option>ビッグローブ光</option>
<option>ソネット光</option>
<option>J-COM</option>
<option>t-com光</option>
<option>nifty光</option>
<option>U-next光</option>
<option>未利用</option>
<option>その他</option>
</select>
<input id="otherLine" placeholder="その他の場合入力">
</div>

<div class="item">家の種類
<select id="house">
<option>持家</option>
<option>戸建賃貸</option>
<option>マンション</option>
</select>
</div>

<div class="item">アンテナ
<select id="antenna">
<option>有</option>
<option>無</option>
</select>
</div>

<div class="item">キャンペーン
<select id="campaign" onchange="toggleAntenna(); toggleOther();">
<option>6万円</option>
<option>6万円（アンテナ）</option>
<option>7万円</option>
<option>7万円（アンテナ）</option>
<option>4万円</option>
<option>1万円</option>
<option>無（one）</option>
<option>無（マンション）</option>
</select>
</div>

<!-- アンテナ条件表示 -->
<div id="antennaArea" class="hidden">

<div class="item">アンテナ種類
<select id="antennaType">
<option>オフホワイト</option>
<option>ライトブラウン</option>
<option>ブラックブラウン</option>
<option>ブラック</option>
<option>グレー</option>
</select>
</div>

<div class="item">アンテナ業者連絡日
<input id="antennaDate">
</div>

</div>

<div class="item">オプション（複数可）<br>
<label><input type="checkbox" value="440">ナンバーディスプレイ</label><br>
<label><input type="checkbox" value="1210">基本放送プラン</label><br>
<label><input type="checkbox" value="3300">専門チャンネルプラン</label><br>
<label><input type="checkbox" value="550">NUROさくっとサポート</label><br>
<label><input type="checkbox" value="550">NURO光safe</label><br>
<label><input type="checkbox" value="550">ソネットくらしの相談</label><br>
<label><input type="checkbox" value="550">キキホショ＋</label><br>
<label><input type="checkbox" value="660">ネットスーパー</label><br>
<label><input type="checkbox" value="2189">U-NEXT</label>
</div>

<div class="item">オプション解約
<select id="cancel">
<option>無</option>
<option>2ヶ月で解約</option>
</select>
</div>

<div class="item">その他
<select id="other">
<option>無</option>
<option>70歳以上</option>
</select>
</div>

<div class="item">工事日
<input id="date1" placeholder="第一希望">
<input id="date2" placeholder="第二希望">
</div>

<div class="item">確電のご希望日時
<input id="confirmDate">
</div>

<div class="item">特記事項
<textarea id="note"></textarea>
</div>

<button onclick="generate()">生成</button>
<button onclick="copyText()">コピー</button>

<div id="result"></div>

</div>

<script>
// アンテナ表示
function toggleAntenna(){
let campaign = document.getElementById("campaign").value;
let area = document.getElementById("antennaArea");
area.style.display = campaign.includes("アンテナ") ? "block" : "none";
}

// その他条件制御
function toggleOther(){
let campaign = document.getElementById("campaign").value;
let other = document.getElementById("other");

let allowed = ["6万円","6万円（アンテナ）","7万円","7万円（アンテナ）","4万円"];

other.innerHTML = '<option>無</option><option>70歳以上</option>';

if(allowed.includes(campaign)){
  other.innerHTML += '<option>2カ月無料</option>';
}
}

// 生成
function generate(){

let name = document.getElementById('name').value;
let phone = document.getElementById('phone').value;
let mail = document.getElementById('mail').value;
let plan = document.getElementById('plan').value;
let line = document.getElementById('line').value;
let otherLine = document.getElementById('otherLine').value;
let campaign = document.getElementById('campaign').value;

if(line === "その他" && otherLine){ line = otherLine; }

// 金額計算
let net = (campaign === "1万円" || campaign === "無（マンション）") ? 3850 : 5500;
let phoneCost = (plan !== "ネットのみ") ? 550 : 0;

let options = document.querySelectorAll('input[type="checkbox"]:checked');
let optionTotal = 0;
let optionNames = [];

options.forEach(o=>{
  optionTotal += parseInt(o.value);
  optionNames.push(o.parentNode.textContent.trim());
});

let total = net + phoneCost + optionTotal;

// アンテナ
let antennaText = "";
if(campaign.includes("アンテナ")){
let antennaType = document.getElementById('antennaType').value;
let antennaDate = document.getElementById('antennaDate').value;
antennaText = `アンテナ種類：${antennaType}
アンテナ連絡日：${antennaDate}`;
}

// その他
let other = document.getElementById('other').value;

// 日程
let date1 = document.getElementById('date1').value;
let date2 = document.getElementById('date2').value;
let confirmDate = document.getElementById('confirmDate').value;
let note = document.getElementById('note').value;

// 出力
let text =
`お名前：${name}様
電話番号：${phone}
メール：${mail}
申込内容：${plan}
現状回線：${line}
キャンペーン：${campaign}
${antennaText}
オプション：${optionNames.join("・") || "無"}
その他：${other}
工事日：第一希望 ${date1} / 第二希望 ${date2}
確電希望：${confirmDate}
特記事項：${note}
合計金額：${total}円`;

document.getElementById("result").textContent = text;
}

// コピー
function copyText(){
let text = document.getElementById("result").textContent;
navigator.clipboard.writeText(text);
alert("コピーしました");
}
</script>

</body>
</html>
