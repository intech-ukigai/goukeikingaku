<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>申込フォーム</title>

<style>
body { font-family:sans-serif; background:#f5f5f5; padding:20px;}
.container { max-width:500px; margin:auto;}
.item { background:#fff; padding:12px; margin-bottom:10px; border-radius:10px;}
input, select, textarea { width:100%; padding:8px; margin-top:5px;}
button { width:100%; padding:12px; margin-top:10px; border:none; border-radius:10px; background:#4CAF50; color:white;}
#result { white-space: pre-wrap; background:#fff; padding:10px; margin-top:10px; border-radius:10px;}
.hidden { display:none; }
</style>
</head>

<body>
<div class="container">

<h2>申込フォーム</h2>

<div class="item">お名前
<input id="name" placeholder="ひらがなで入力してください">
</div>

<div class="item">お電話番号
<input id="phone">
</div>

<div class="item">メールアドレス<input id="mail"></div>

<div class="item">お申込内容
<select id="plan">
<option>ネットのみ</option>
<option>ネット・新番</option>
<option>ネット・ポーター</option>
</select>
</div>

<div class="item">現状回線
<select id="line">
<option>ドコモ光</option>
<option>ソフトバンク光</option>
<option>AU光</option>
<option>エアー</option>
<option>5G</option>
<option>フレッツ</option>
<option>OCN光</option>
<option>ビッグローブ光</option>
<option>ソネット光</option>
<option>J-COM</option>
<option>t-com光</option>
<option>nifty光</option>
<option>U-next光</option>
<option>未利用</option>
<option>その他</option>
</select>
<input id="otherLine" placeholder="その他の場合入力">
</div>

<div class="item">家の種類
<select id="house">
<option>持家</option>
<option>戸建賃貸</option>
<option>マンション</option>
</select>
</div>

<!-- ★ここ変更 -->
<div class="item">アンテナの有無
<select id="antenna" onchange="toggleCampaign();">
<option>有</option>
<option>無</option>
<option>ケーブル</option>
</select>
</div>

<!-- ★キャンペーン -->
<div class="item">キャンペーン
<select id="campaign" onchange="toggleAntenna(); toggleOther();">
<option>6万円</option>
<option id="c1">6万円（アンテナ）</option>
<option>7万円</option>
<option id="c2">7万円（アンテナ）</option>
<option>4万円</option>
<option>1万円</option>
<option>無（one）</option>
<option>無（マンション）</option>
</select>
</div>

<div id="antennaArea" class="hidden">
<div class="item">アンテナ種類
<select id="antennaType">
<option>オフホワイト</option>
<option>ライトブラウン</option>
<option>ブラックブラウン</option>
<option>ブラック</option>
<option>グレー</option>
</select>
</div>

<div class="item">アンテナ業者連絡日
<input id="antennaDate">
</div>
</div>

<!-- 以下そのまま -->

<div class="item">オプション（複数可）<br>
<label><input type="checkbox" value="440">ナンバーディスプレイ</label><br>
<label><input type="checkbox" value="1210">基本放送プラン</label><br>
<label><input type="checkbox" value="3300">専門チャンネルプラン</label><br>
<label><input type="checkbox" value="550">NUROさくっとサポート</label><br>
<label><input type="checkbox" value="550">NURO光safe</label><br>
<label><input type="checkbox" value="550">ソネットくらしの相談</label><br>
<label><input type="checkbox" value="550">キキホショ＋</label><br>
<label><input type="checkbox" value="660">ネットスーパー</label><br>
<label><input type="checkbox" value="2189">U-NEXT</label>
</div>

<div class="item">オプション解約
<select id="cancel">
<option>無</option>
<option>2ヶ月で解約</option>
</select>
</div>

<div class="item">その他（複数選択可）<br>
<label><input type="checkbox" name="otherCheck" value="70歳以上">70歳以上</label><br>
<label id="twoMonthOption" class="hidden">
<input type="checkbox" name="otherCheck" value="2カ月無料">2カ月無料
</label>
</div>

<div class="item">工事日
<input id="date1" placeholder="第一希望">
<input id="date2" placeholder="第二希望">
</div>

<div class="item">確電のご希望日時
<input id="confirmDate">
</div>

<div class="item">特記事項
<textarea id="note"></textarea>
</div>

<button onclick="generate()">生成</button>
<button onclick="copyText()">コピー</button>

<div id="result"></div>

</div>

<script>

// ★ここが新ロジック
function toggleCampaign(){
let antenna = document.getElementById("antenna").value;

let c1 = document.getElementById("c1");
let c2 = document.getElementById("c2");

// 有なら非表示
if(antenna === "有"){
  c1.style.display = "none";
  c2.style.display = "none";
}else{
  c1.style.display = "block";
  c2.style.display = "block";
}
}

// 既存
function toggleAntenna(){
let campaign = document.getElementById("campaign").value;
document.getElementById("antennaArea").style.display =
campaign.includes("アンテナ") ? "block" : "none";
}

function toggleOther(){
let campaign = document.getElementById("campaign").value;
let two = document.getElementById("twoMonthOption");

let allowed = ["6万円","6万円（アンテナ）","7万円","7万円（アンテナ）","4万円"];

two.style.display = allowed.includes(campaign) ? "block" : "none";
}

window.onload = function(){
toggleAntenna();
toggleOther();
toggleCampaign();
}

// generateはそのままでOK（省略）

</script>

</body>
</html>
