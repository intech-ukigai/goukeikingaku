<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NUROお申込フォーム</title>
<style>
body{font-family:sans-serif;background:#f5f5f5;margin:0}
.header{background:#000;color:#fff;padding:14px 20px;font-size:20px;font-weight:bold}
.container{max-width:500px;margin:20px auto;padding:0 10px}
.item{background:#fff;padding:12px;margin-bottom:12px;border-radius:10px}
.label-title{background:#222;color:#fff;padding:6px 10px;border-radius:6px;margin-bottom:6px;font-size:14px}
input,select,textarea{width:100%;padding:8px;margin-top:5px;box-sizing:border-box}
input[type=checkbox]{width:auto;margin-right:6px}
label{display:block;margin-bottom:5px}
button{width:100%;padding:12px;margin-top:10px;border:none;border-radius:10px;background:#4CAF50;color:#fff}
#result{white-space:pre-wrap;background:#fff;padding:10px;margin-top:10px;border-radius:10px}
.hidden{display:none}
</style></head><body>
<div class="header">NUROお申込フォーム</div>
<div class="container">
<div class="item"><div class="label-title">お名前</div><input id="name"></div>
<div class="item"><div class="label-title">お電話番号</div><input id="phone"></div>
<div class="item"><div class="label-title">メールアドレス</div><input id="mail"></div>

<div class="item"><div class="label-title">お申込内容</div>
<select id="plan">
<option>ネットのみ</option>
<option>ネット・新番</option>
<option>ネット・ポーター</option>
<option>ネット・新番（東海）</option>
<option>ネット・ポーター（東海）</option>
</select></div>

<div class="item"><div class="label-title">家の種類</div>
<select id="house" onchange="toggleCampaign()">
<option>持家</option><option>戸建賃貸</option><option>マンション</option>
</select></div>

<div class="item"><div class="label-title">アンテナの有無</div>
<select id="antenna" onchange="toggleCampaign()">
<option>有</option><option>無</option><option>ケーブル</option>
</select></div>

<div class="item"><div class="label-title">キャンペーン</div>
<select id="campaign">
<option>6万円</option>
<option id="c1">6万円（アンテナ）</option>
<option>7万円</option>
<option id="c2">7万円（アンテナ）</option>
<option>4万円</option>
<option>2万円</option>
<option id="c3">1万円</option>
<option>無（one）</option>
<option id="c4">無（マンション）</option>
</select></div>

<button onclick="generate()">生成</button>
<pre id="result"></pre>
</div>

<script>
function toggleCampaign(){
 let antenna=antennaEl.value, house=houseEl.value;
 c1.style.display=(antenna==="有")?"none":"block";
 c2.style.display=(antenna==="有")?"none":"block";
 let m=house==="マンション";
 c3.style.display=m?"block":"none";
 c4.style.display=m?"block":"none";
}
const antennaEl=document.getElementById("antenna");
const houseEl=document.getElementById("house");
const c1=document.getElementById("c1");
const c2=document.getElementById("c2");
const c3=document.getElementById("c3");
const c4=document.getElementById("c4");
toggleCampaign();

function generate(){
 const plan=document.getElementById("plan").value;
 const campaign=document.getElementById("campaign").value;
 let net=(campaign==="1万円"||campaign==="無（マンション）")?3850:5500;
 let phoneCost=0;
 if(plan==="ネット・新番"||plan==="ネット・ポーター") phoneCost=550;
 if(plan==="ネット・新番（東海）"||plan==="ネット・ポーター（東海）") phoneCost=330;
 document.getElementById("result").textContent=
`ネット料金：${net}円
電話料金：${phoneCost}円
合計金額：${net+phoneCost}円`;
}
</script>
</body></html>
